name: Deploy to Production

on:
  workflow_run:
    workflows: ["Test and Build Docker"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: registry.digitalocean.com
  IMAGE_NAME: ${{ secrets.DO_REGISTRY_NAME }}/be-repo

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('dockerfile', 'package*.json') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_ACCESS_TOKEN }}

      - name: Log in to DigitalOcean Container Registry
        run: doctl registry login --expiry-seconds 600

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  deploy:
    name: Deploy to DigitalOcean Droplet
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file from secrets
        run: |
          # Dynamically generate .env from all secrets, excluding infra-only ones
          EXCLUDE="DO_ACCESS_TOKEN|DO_SSH_PRIVATE_KEY|DO_DROPLET_HOST|DO_DROPLET_USERNAME|DO_REGISTRY_NAME|DO_REGISTRY|GITHUB_TOKEN"
          echo '${{ toJSON(secrets) }}' | jq -r --arg ex "$EXCLUDE" '
            to_entries[]
            | select(.key | test($ex) | not)
            | "\(.key)=\"\(.value)\""
          ' > .env.production

          # DO_REGISTRY is needed by docker-compose.production.yml for image name
          echo 'DO_REGISTRY="${{ secrets.DO_REGISTRY }}"' >> .env.production

          # Fix naming mismatches: GH_CLIENT_* → GOOGLE_CLIENT_*
          sed -i 's/^GH_CLIENT_ID="/GOOGLE_CLIENT_ID="/' .env.production
          sed -i 's/^GH_CLIENT_SECRET="/GOOGLE_CLIENT_SECRET="/' .env.production
          sed -i 's/^GH_CALLBACK_URL="/GOOGLE_CALLBACK_URL="/' .env.production

      - name: Validate required env vars
        run: |
          REQUIRED="DATABASE_URL JWT_SECRET FRONTEND_URL GOOGLE_CLIENT_ID"
          MISSING=""
          for var in $REQUIRED; do
            grep -q "^${var}=" .env.production || MISSING="$MISSING $var"
          done
          if [ -n "$MISSING" ]; then
            echo "::error::Missing required env vars:$MISSING"
            exit 1
          fi

      - name: Copy deployment files to Droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DO_DROPLET_HOST }}
          username: ${{ secrets.DO_DROPLET_USERNAME }}
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          source: "docker-compose.production.yml,.env.production"
          target: "/app/be-repo"

      - name: Setup VPS workspace
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_DROPLET_HOST }}
          username: ${{ secrets.DO_DROPLET_USERNAME }}
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          script: |
            mkdir -p /app/be-repo
            cd /app/be-repo
            # Move .env file to correct location
            [ -f .env.production ] && mv .env.production .env || true

      - name: Deploy to Droplet via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_DROPLET_HOST }}
          username: ${{ secrets.DO_DROPLET_USERNAME }}
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          script: |
            cd /app/be-repo

            # Log in to DigitalOcean Container Registry
            echo ${{ secrets.DO_ACCESS_TOKEN }} | docker login registry.digitalocean.com -u ${{ secrets.DO_ACCESS_TOKEN }} --password-stdin

            # Pull latest image
            docker compose -f docker-compose.production.yml pull

            # Stop and remove old containers
            docker compose -f docker-compose.production.yml down

            # Start new containers with secrets from .env file
            docker compose -f docker-compose.production.yml up -d

            # Clean up old images
            docker image prune -af

      - name: Verify Deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_DROPLET_HOST }}
          username: ${{ secrets.DO_DROPLET_USERNAME }}
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          script: |
            cd /app/be-repo
            docker compose -f docker-compose.production.yml ps
